name: Build and Release

on:
  push:
    branches: [ hot ]
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review, closed ]
    branches: [ master ]

permissions:
  contents: write          # needed to push tags and create releases

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ─────────── Builds ──────────────────────────────────
  build-android:
    needs: quality
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is not configured"
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
          } > android/key.properties
      - run: flutter build apk --release --split-per-abi
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  build-windows:
    needs: quality
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter build windows
      - name: Zip release folder
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-${{ github.ref_name }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.ref_name }}
          path: windows-${{ github.ref_name }}.zip

  build-linux:
    needs: quality
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build linux
      - name: Tar release bundle
        run: tar -czf linux-${{ github.ref_name }}.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.ref_name }}
          path: linux-${{ github.ref_name }}.tar.gz

  # ─────────── Beta pre‑release (push to hot) ──────────
  release-beta:
    if: github.ref == 'refs/heads/hot'
    needs: [ build-android, build-windows, build-linux ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force-update 'beta' tag
        run: |
          git tag -f beta
          git push -f origin beta
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          prerelease: true
          name: "Beta Build (latest hot)"
          body: "Automated pre‑release from the `hot` branch."
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
            artifacts/**/*.tar.gz

  # ─────────── Stable release (PR merged to master) ────
  release-stable:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master'
    needs: [ build-android, build-windows, build-linux ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from PR title
        id: parse
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Look for a version like v1.2.3 or 1.2.3
          VERSION=$(echo "$TITLE" | grep -oP 'v?\d+\.\d+\.\d+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in PR title. Release will be skipped."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            # Ensure a leading 'v'
            if [[ $VERSION != v* ]]; then
              VERSION="v$VERSION"
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version extracted: $VERSION"
          fi

      - name: Create tag and push
        if: steps.parse.outputs.skip != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.parse.outputs.version }}
          git push origin ${{ steps.parse.outputs.version }}

      - uses: actions/download-artifact@v4
        if: steps.parse.outputs.skip != 'true'
        with:
          path: artifacts

      - name: Create stable release
        if: steps.parse.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse.outputs.version }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
